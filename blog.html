<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="shortcut icon" href="./assets/img/favicon.ico">
		<title>Blog</title>
		<link rel="modulepreload" crossorigin href="./js/common.min.js?v=1775580282998">
		<script type="module" crossorigin="" src="./js/popup.min.js?v=1775580282998"></script>
		<link rel="stylesheet" crossorigin="" href="./css/popup.min.css?v=1775580282998">
		<link rel="stylesheet" crossorigin="" href="./css/blog.min.css?v=1775580282998">
	</head>
	<body>
		<div class="wrapper">
			<header data-fls-header="" class="header">
				<div class="header__container">
					<div class="header__body">
						<a href="index.html" class="header__link-logo" aria-label="Go to home page">
							<div class="header__logo">
								<svg xmlns="http://www.w3.org/2000/svg" viewbox="0 0 44 44" fill="none">
									<path fill="#7c4ee4" d="M4.89 38.972C1.091 35.228-.69 29.532.38 24.298c1.06-5.878 5.625-11.002 11.39-12.617 2.823 2.864 5.682 5.689 8.517 8.537.584.563 1.12 1.177 1.75 1.69-2.01.02-4.023-.053-6.03.025-2.772.175-5.121 2.79-4.966 5.57-.026 2.807 2.49 5.343 5.298 5.326 5.522.013 11.044-.001 16.563.009 3.628 3.632 7.25 7.272 10.898 10.886-.564.107-1.136.078-1.705.073l-25.54.001c-4.318.011-8.631-1.74-11.667-4.826"></path>
									<path fill="#7c4ee4" d="M10.758 10.713C7.168 7.148 3.633 3.523 0 0c8.499.033 16.996.005 25.495.016 1.426.019 2.867-.081 4.277.187a16.3 16.3 0 0 1 9.539 4.92c2.78 2.883 4.407 6.825 4.533 10.823a16.6 16.6 0 0 1-2.621 9.388c-2.1 3.223-5.343 5.772-9.075 6.791-2.787-2.832-5.617-5.623-8.422-8.44-.565-.523-1.039-1.151-1.687-1.584q.165-.136.36-.23c1.782.038 3.567.033 5.35.01 2.766-.077 5.194-2.605 5.14-5.375.08-2.25-1.443-4.412-3.542-5.184-.8-.346-1.684-.351-2.54-.344-5.172.005-10.342-.001-15.513.004a.65.65 0 0 1-.536-.269"></path>
								</svg>
								<span>Zarrin</span>
							</div>
						</a>
						<div class="header__menu menu">
							<nav class="menu__body">
								<ul class="menu__list">
									<li class="menu__item">
										<a href="index.html" class="menu__link">Home</a>
									</li>
									<li class="menu__item">
										<a href="blog.html" class="menu__link menu__link--active">Blog</a>
									</li>
									<li class="menu__item">
										<a href="about.html" class="menu__link">About</a>
									</li>
								</ul>
							</nav>
						</div>
						<div class="header__actions">
							<button data-fls-search="" type="button" class="header__search search search--icon-search" aria-label="Search"></button>
							<button type="button" data-fls-button="" class="header__button button button--600" data-fls-popup-link="popup">Contact Us</button>
							<button type="button" data-fls-menu="" class="header__icon-menu icon-menu" aria-label="Menu">
								<span></span>
							</button>
						</div>
					</div>
				</div>
			</header>
			<main class="page">
				<div data-fls-blog="" class="blog"></div>
			</main>
			<footer data-fls-footer="" class="footer">
				<div class="footer__container"></div>
			</footer>
		</div>
		<div data-fls-popup="popup" aria-hidden="true" class="popup">
			<div data-fls-popup-wrapper="" class="popup__wrapper">
				<div data-fls-popup-body="" class="popup__body">
					<div class="popup__head">
						<h2 data-fls-title="" class="popup__title title">Contact US</h2>
						<button data-fls-popup-close="" type="button" class="popup__close">
							<svg width="23" height="23" viewbox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
								<path opacity="0.850056" d="M1.73333 1.48883L21.5469 21.0288" stroke="#979797" stroke-linecap="square"></path>
								<path opacity="0.850056" d="M21.2667 1.48883L1.45309 21.0288" stroke="#979797" stroke-linecap="square"></path>
							</svg>
						</button>
					</div>
					<div data-fls-popup-content="" class="popup__form">
						<form data-fls-form="dev" data-fls-form-popup="form-message" action="#" class="form">
							<div class="form__body">
								<div class="form__row">
									<div class="form__column">
										<label class="form__label" for="input-name">Name*</label>
										<input data-fls-input="" data-fls-form-validatenow="" required autocomplete="off" type="text" name="form[name]" data-fls-form-errtext="The field is required." class="form__input input" id="input-name" placeholder="Type your full name">
									</div>
									<div class="form__column">
										<label class="form__label" for="input-email">Email*</label>
										<input data-fls-input="" data-fls-form-validatenow="" required autocomplete="off" type="email" name="form[email]" data-fls-form-errtext="The field is required." class="form__input input" id="input-email" placeholder="name@email.com">
									</div>
								</div>
								<div class="form__row">
									<div class="form__column">
										<label class="form__label" for="input-tel-number">Phone*</label>
										<input data-fls-input="" data-fls-form-validatenow="" required autocomplete="off" type="tel" name="form[tel-number]" data-fls-form-errtext="The field is required." class="form__input input" id="input-tel-number" placeholder="+11 2222 333344">
									</div>
									<div class="form__column">
										<label class="form__label" for="input-subject">Subject</label>
										<input data-fls-input="" autocomplete="off" type="text" name="form[subject]" class="form__input input" id="input-subject" placeholder="Type your subject">
									</div>
								</div>
								<div class="form__row">
									<div class="form__column form__column--text-area">
										<label class="form__label" for="input-message">Message*</label>
										<textarea data-fls-input="" data-fls-form-validatenow="" data-fls-input-autoheight="" required autocomplete="off" name="form[message]" data-fls-form-errtext="The field is required." placeholder="Type your message..." class="form__input input input--text-area" id="input-message"></textarea>
									</div>
								</div>
							</div>
							<div class="form__actions">
								<button type="submit" data-fls-button="" class="form__button button button--send">Send Message</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
		<div data-fls-popup="form-message" aria-hidden="true" class="popup popup--message">
			<div data-fls-popup-wrapper="" class="popup__wrapper">
				<div data-fls-popup-body="" class="popup__body">
					<div class="popup__text">
						<p>Your form has been submitted successfully.</p>
					</div>
					<button data-fls-button="" data-fls-popup-close="" type="button" class="popup__button button">OK</button>
				</div>
			</div>
		</div>
	</body>
</html>
